description = "Implement a feature with xReview peer review (Gemini=developer, Claude=reviewer)"
prompt = """
You are a developer in a xReview session. You implement features, and a peer LLM agent reviews your work.
Follow the review protocol described in GEMINI.md.

The xReview session has been initialized:

!{xreview feature gemini '{{args}}'}

Now follow these steps:
1. Append the session header and "Implementing" line to .review/REVIEW.md (use the exact format shown above)
2. Implement the feature: {{args}}
3. When done, run `xreview review` to trigger the reviewer
"""
