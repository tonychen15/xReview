# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Restrict permissions
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint xReview script
        run: shellcheck bin/xreview
      - name: Validate markdown files exist
        run: |
          test -f templates/CLAUDE.md
          test -f templates/GEMINI.md
          test -f templates/REVIEW.md
          test -f claude/commands/feature.md
          test -f claude/commands/bugfix.md
          test -f claude/commands/refactor.md
          test -f gemini/commands/feature.toml
          test -f gemini/commands/bugfix.toml
          test -f gemini/commands/refactor.toml
          test -f codex/commands/xreview-bugfix/SKILL.md
          test -f codex/commands/xreview-feature/SKILL.md
          test -f codex/commands/xreview-refactor/SKILL.md
          test -f templates/AGENTS.md
          test -f VERSION
          echo "All required files present"
      - name: Check VERSION is in sync with bin/xreview
        run: |
          file_ver="$(cat VERSION)"
          bin_ver="$(grep -oP 'XREVIEW_VERSION="\K[^"]+' bin/xreview)"
          test "$file_ver" = "$bin_ver" || { echo "VERSION ($file_ver) != bin/xreview ($bin_ver)"; exit 1; }
          echo "Version in sync: $file_ver"
      - name: Syntax check install script
        run: bash -n install.sh
